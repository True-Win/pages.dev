<html lang="en">
<head>

<style>
  :root {
    --bg-a: #070b14;
    --bg-b: #0c1424;
    --blue: #2f7bf0;
    --blue-bright: #4f9bff;
    --gold: #f5b115;
    --gold-bright: #ffc945;
    --text: #eef2fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    width: 100%;
  }

  body {
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
      radial-gradient(900px 600px at 50% 30%, rgba(47,123,240,0.16), transparent 60%),
      radial-gradient(700px 500px at 50% 90%, rgba(245,177,21,0.08), transparent 55%),
      linear-gradient(180deg, var(--bg-b), var(--bg-a));
    overflow: hidden;
  }

  main {
    width: 100%;
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 32px 18px;
    text-align: center;
  }

  .loader {
    position: relative;
    width: 120px;
    height: 120px;
    flex: 0 0 auto;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      var(--blue) 0%,
      var(--blue-bright) 25%,
      var(--gold) 55%,
      var(--gold-bright) 75%,
      var(--blue) 100%
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 7px), #000 calc(100% - 6px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 7px), #000 calc(100% - 6px));
    animation: spin 1.1s linear infinite;
  }

  .ring-inner {
    position: absolute;
    inset: 22px;
    border-radius: 50%;
    background: conic-gradient(
      from 180deg,
      transparent 0%,
      rgba(79,155,255,0.0) 40%,
      var(--gold-bright) 70%,
      transparent 72%
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
    animation: spin-rev 0.9s linear infinite;
  }

  .core {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 30px;
    height: 30px;
    margin: -15px 0 0 -15px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold));
    box-shadow: 0 0 22px rgba(245,177,21,0.6);
    animation: pulse 1.1s ease-in-out infinite;
  }

  .orbit {
    position: absolute;
    inset: 0;
    animation: spin 1.6s linear infinite;
  }
  .orbit::before {
    content: "";
    position: absolute;
    top: -3px;
    left: 50%;
    width: 10px;
    height: 10px;
    margin-left: -5px;
    border-radius: 50%;
    background: var(--blue-bright);
    box-shadow: 0 0 12px rgba(79,155,255,0.8);
  }
  .orbit.b { animation-duration: 2.1s; animation-direction: reverse; }
  .orbit.b::before { background: var(--gold-bright); box-shadow: 0 0 12px rgba(255,201,69,0.8); }
  .orbit.c { animation-duration: 1.3s; }
  .orbit.c::before {
    width: 7px; height: 7px; margin-left: -3.5px; top: -2px;
    background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.7);
  }

  .play-now {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 150px;
    min-height: 48px;
    padding: 13px 26px;
    border-radius: 999px;
    color: #07101e;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 18px 42px -16px rgba(245,177,21,0.75);
    font-size: 0.98rem;
    font-weight: 800;
    line-height: 1;
    text-decoration: none;
    letter-spacing: .01em;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .play-now:hover {
    transform: translateY(-2px);
    box-shadow: 0 22px 55px -14px rgba(245,177,21,0.9);
  }
  .play-now:focus-visible {
    outline: 2px solid var(--blue-bright);
    outline-offset: 4px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes spin-rev { to { transform: rotate(-360deg); } }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.78); opacity: 0.75; }
  }

  @media (max-width: 480px) {
    .loader { width: 104px; height: 104px; }
    .play-now { min-width: 138px; min-height: 46px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .ring, .ring-inner, .orbit, .core { animation-duration: 2.4s; }
  }
</style>
</head>
<body>
<main id="main">
  <div aria-label="Loading" class="loader" role="status">
    <div class="ring"></div>
    <div class="ring-inner"></div>
    <div class="orbit"></div>
    <div class="orbit b"></div>
    <div class="orbit c"></div>
    <div class="core"></div>
  </div>
  <a class="play-now" href="https://www.time4100.com/affiliates/?btag=2730113" rel="nofollow">Play Now</a>
</main>
<script>
  setTimeout(function () {
    window.location.replace('https://www.time4100.com/affiliates/?btag=2730113');
  }, 1500);
</script>
</body>
</html>
